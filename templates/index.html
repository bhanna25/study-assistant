<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Assistant</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
  <style>
    :root[data-theme="dark"] {
      --bg: #08080f;
      --surface: #111120;
      --surface2: #1a1a30;
      --border: #22223a;
      --border2: #2e2e50;
      --text: #eeeef8;
      --muted: #7070a0;
      --accent: #6c63ff;
      --accent2: #a855f7;
      --accent-glow: rgba(108,99,255,0.22);
      --btn-text: #fff;
      --shadow: 0 8px 32px rgba(0,0,0,0.45);
      --shadow-sm: 0 2px 12px rgba(0,0,0,0.28);
    }
    :root[data-theme="light"] {
      --bg: #f2f2fa;
      --surface: #ffffff;
      --surface2: #f0f0ff;
      --border: #e0e0f0;
      --border2: #d0d0e8;
      --text: #0f0f1e;
      --muted: #6060a0;
      --accent: #6c63ff;
      --accent2: #a855f7;
      --accent-glow: rgba(108,99,255,0.15);
      --btn-text: #fff;
      --shadow: 0 8px 32px rgba(100,100,200,0.12);
      --shadow-sm: 0 2px 12px rgba(100,100,200,0.08);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; transition: background 0.4s, color 0.4s; }

    .header {
      background: var(--surface); padding: 0.85rem 2rem;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 100; box-shadow: var(--shadow-sm);
    }
    .header-left { display: flex; align-items: center; gap: 12px; }
    .header-icon {
      width: 40px; height: 40px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 12px; display: flex; align-items: center; justify-content: center;
      font-size: 18px; box-shadow: 0 0 18px var(--accent-glow);
    }
    .header h1 { font-family: 'Playfair Display', serif; font-size: 20px; color: var(--text); letter-spacing: -0.3px; }
    .header p { font-size: 11px; color: var(--muted); margin-top: 1px; }
    .header-right { display: flex; align-items: center; gap: 8px; }
    .theme-toggle {
      background: var(--surface2); border: 1px solid var(--border2); border-radius: 20px;
      padding: 7px 16px; color: var(--text); font-size: 12px; cursor: pointer;
      display: flex; align-items: center; gap: 6px; font-family: 'Inter', sans-serif;
      font-weight: 500; transition: all 0.2s;
    }
    .theme-toggle:hover { border-color: var(--accent); color: var(--accent); box-shadow: 0 0 12px var(--accent-glow); }

    .app-container { display: flex; height: calc(100vh - 62px); width: 100%; }

    .sidebar {
      width: 260px; background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column; padding: 16px;
    }
    .new-chat-btn {
      padding: 11px 16px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff; border: none; border-radius: 10px; cursor: pointer;
      font-weight: 600; font-family: 'Inter', sans-serif; font-size: 13px;
      margin-bottom: 18px; width: 100%;
      box-shadow: 0 4px 16px var(--accent-glow); transition: all 0.2s;
    }
    .new-chat-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 22px var(--accent-glow); }
    .new-chat-btn:active { transform: translateY(0); }
    .sidebar-label { font-size: 10px; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; padding-left: 4px; }
    .chat-history-list { flex: 1; overflow-y: auto; }
    .chat-history-list::-webkit-scrollbar { width: 3px; }
    .chat-history-list::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
    .chat-history-item {
      padding: 10px 12px; margin-bottom: 4px; border-radius: 10px;
      color: var(--text); font-size: 0.82rem; cursor: pointer;
      border: 1px solid transparent; display: flex; align-items: center; gap: 6px;
      transition: all 0.18s;
    }
    .chat-history-item:hover { background: var(--surface2); border-color: var(--border); }

    .chat-area { flex: 1; display: flex; flex-direction: column; background: var(--bg); overflow-y: auto; }

    .status-dot { width: 8px; height: 8px; background: #22c55e; border-radius: 50%; animation: pulse 2s infinite; box-shadow: 0 0 8px #22c55e88; }
    @keyframes pulse { 0%,100% { opacity:1; transform:scale(1); } 50% { opacity:0.6; transform:scale(0.85); } }

    .container { max-width: 820px; margin: 0 auto; padding: 2rem 1.5rem; }

    .mode-switcher { display: flex; gap: 10px; margin-bottom: 1.5rem; }
    .mode-btn {
      flex: 1; padding: 12px; border: 1px solid var(--border2); border-radius: 12px;
      background: var(--surface); color: var(--muted);
      font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 500;
      cursor: pointer; text-align: center; transition: all 0.22s;
    }
    .mode-btn:hover { border-color: var(--accent); color: var(--accent); }
    .mode-btn.active {
      border-color: var(--accent); color: var(--accent); background: var(--surface2); font-weight: 600;
      box-shadow: inset 0 0 0 1px var(--accent), 0 0 14px var(--accent-glow);
    }

    .tabs { display: flex; gap: 6px; margin-bottom: 1.5rem; background: var(--surface); padding: 6px; border-radius: 14px; border: 1px solid var(--border); }
    .tab {
      flex: 1; padding: 9px 6px; border: none; border-radius: 10px;
      background: transparent; color: var(--muted); font-size: 12px;
      font-family: 'Inter', sans-serif; cursor: pointer; transition: all 0.2s;
      display: flex; flex-direction: column; align-items: center; gap: 3px;
    }
    .tab span { font-size: 16px; }
    .tab.active { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; font-weight: 600; box-shadow: 0 2px 12px var(--accent-glow); }

    .section { display: none; animation: fadeSlideIn 0.3s ease; }
    .section.active { display: block; }
    @keyframes fadeSlideIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }

    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 18px; padding: 1.5rem; box-shadow: var(--shadow-sm); }

    .chat-box {
      min-height: 340px; max-height: 440px; overflow-y: auto;
      display: flex; flex-direction: column; gap: 14px;
      margin-bottom: 16px; padding-right: 4px;
    }
    .chat-box::-webkit-scrollbar { width: 4px; }
    .chat-box::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

    .msg {
      max-width: 80%; padding: 13px 18px; border-radius: 18px;
      font-size: 14px; line-height: 1.75; white-space: pre-wrap;
      animation: msgPop 0.28s cubic-bezier(0.34,1.56,0.64,1);
    }
    @keyframes msgPop { from { opacity:0; transform:scale(0.92) translateY(8px); } to { opacity:1; transform:scale(1) translateY(0); } }
    .msg.user {
      align-self: flex-end;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff; border-radius: 18px 18px 4px 18px;
      box-shadow: 0 4px 20px var(--accent-glow);
    }
    .msg.ai {
      align-self: flex-start; background: var(--surface2); color: var(--text);
      border: 1px solid var(--border); border-radius: 18px 18px 18px 4px; box-shadow: var(--shadow-sm);
    }
    .msg.thinking {
      align-self: flex-start; background: var(--surface2);
      border: 1px solid var(--border); color: var(--muted); font-style: italic;
      border-radius: 18px 18px 18px 4px; animation: shimmer 1.5s infinite;
    }
    @keyframes shimmer { 0%,100% { opacity:0.6; } 50% { opacity:1; } }

    .quick-prompts { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
    .quick-btn {
      padding: 7px 15px; background: var(--surface2); border: 1px solid var(--border2);
      border-radius: 20px; color: var(--muted); font-size: 12px; font-weight: 500;
      font-family: 'Inter', sans-serif; cursor: pointer; transition: all 0.2s;
    }
    .quick-btn:hover {
      border-color: var(--accent); color: var(--accent);
      background: var(--surface); box-shadow: 0 0 10px var(--accent-glow); transform: translateY(-1px);
    }

    .chat-input { display: flex; gap: 10px; }
    input, textarea {
      background: var(--surface2); border: 1px solid var(--border2); border-radius: 12px;
      color: var(--text); font-family: 'Inter', sans-serif; font-size: 14px;
      padding: 13px 18px; outline: none; transition: border 0.2s, box-shadow 0.2s; width: 100%;
    }
    input:focus, textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
    input::placeholder, textarea::placeholder { color: var(--muted); }
    .chat-input input { flex: 1; width: auto; }

    .btn {
      padding: 12px 26px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff; border: none; border-radius: 12px;
      font-size: 14px; font-family: 'Inter', sans-serif; font-weight: 600;
      cursor: pointer; transition: all 0.2s; white-space: nowrap;
      box-shadow: 0 4px 16px var(--accent-glow);
    }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 6px 24px var(--accent-glow); }
    .btn:active { transform: translateY(0); box-shadow: 0 2px 8px var(--accent-glow); }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none; box-shadow: none; }
    .btn-outline { background: transparent; border: 1px solid var(--border2); color: var(--text); box-shadow: none; }
    .btn-outline:hover { border-color: var(--accent); color: var(--accent); box-shadow: 0 0 12px var(--accent-glow); }

    .form-group { margin-bottom: 14px; }
    .form-group label { font-size: 11px; font-weight: 700; color: var(--muted); display: block; margin-bottom: 7px; letter-spacing: 0.8px; text-transform: uppercase; }
    .form-group textarea { min-height: 160px; resize: vertical; }
    .range-row { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
    .range-row label { font-size: 13px; color: var(--muted); white-space: nowrap; }
    .range-row input[type=range] { flex: 1; accent-color: var(--accent); }
    .range-row span { font-size: 14px; font-weight: 600; color: var(--accent2); min-width: 24px; }

    .result-label { font-size: 10px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--accent); margin-bottom: 10px; margin-top: 18px; }
    .result { padding: 1.3rem; background: var(--surface2); border: 1px solid var(--border); border-radius: 14px; font-size: 14px; line-height: 1.85; white-space: pre-wrap; color: var(--text); box-shadow: var(--shadow-sm); }

    .progress-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; font-size: 13px; color: var(--muted); }
    .fc-card {
      background: var(--surface2); border: 1px solid var(--border2); border-radius: 18px;
      padding: 2.5rem 2rem; min-height: 200px;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      cursor: pointer; text-align: center; gap: 12px; transition: all 0.25s; box-shadow: var(--shadow-sm);
    }
    .fc-card:hover { border-color: var(--accent); transform: translateY(-2px); box-shadow: 0 8px 30px var(--accent-glow); }
    .fc-label { font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--accent); font-weight: 700; }
    .fc-text { font-size: 18px; line-height: 1.6; color: var(--text); }
    .fc-hint { font-size: 12px; color: var(--muted); }
    .fc-btns { display: flex; gap: 10px; margin-top: 12px; }
    .fc-btns button { flex: 1; padding: 12px; border-radius: 10px; font-size: 14px; font-family: 'Inter', sans-serif; cursor: pointer; }

    .done-card { text-align: center; padding: 3rem; }
    .done-card .emoji { font-size: 52px; margin-bottom: 16px; display: block; animation: bounceIn 0.5s cubic-bezier(0.34,1.56,0.64,1); }
    @keyframes bounceIn { from { transform:scale(0); } to { transform:scale(1); } }
    .done-card h2 { font-size: 22px; font-weight: 700; margin-bottom: 8px; color: var(--text); }
    .done-card p { color: var(--muted); margin-bottom: 24px; }
    .done-btns { display: flex; gap: 10px; justify-content: center; }

    .footer { text-align: center; padding: 2rem; font-size: 12px; color: var(--muted); letter-spacing: 0.3px; }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-left">
      <div class="header-icon">🤖</div>
      <div>
        <h1>AI Assistant</h1>
        <p>Powered by Groq · Always ready to help</p>
      </div>
    </div>
    <div class="header-right">
      <div class="status-dot"></div>
      <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">🌙 Dark</button>
      <button class="theme-toggle" onclick="clearHistory()">🗑️ Clear</button>
    </div>
  </div>

  <div class="app-container">
    <aside class="sidebar">
      <button class="new-chat-btn" onclick="createNewChat()">+ New Chat</button>
      <div class="sidebar-label">Recent chats</div>
      <div class="chat-history-list" id="chatHistoryList"></div>
    </aside>

    <main class="chat-area">
      <div class="container">

        <div class="mode-switcher">
          <button class="mode-btn active" onclick="switchMode('general', this)">🤖 General Assistant</button>
          <button class="mode-btn" onclick="switchMode('study', this)">📚 Study Mode</button>
        </div>

        <div id="generalMode">
          <div class="card">
            <div class="quick-prompts">
              <button class="quick-btn" onclick="quickPrompt('Explain this concept simply:')">💡 Explain a concept</button>
              <button class="quick-btn" onclick="quickPrompt('Write a short essay about:')">✍️ Write an essay</button>
              <button class="quick-btn" onclick="quickPrompt('Give me tips for:')">🎯 Give me tips</button>
              <button class="quick-btn" onclick="quickPrompt('What is the difference between')">🔄 Compare topics</button>
              <button class="quick-btn" onclick="quickPrompt('Solve this problem:')">🧮 Solve a problem</button>
              <button class="quick-btn" onclick="quickPrompt('Translate this to Hindi:')">🌐 Translate</button>
            </div>
            <div class="chat-box" id="chatBox"></div>
            <div class="chat-input">
              <input id="chatInput" placeholder="Ask me anything…" onkeydown="if(event.key==='Enter') sendChat()" />
              <button class="btn" onclick="sendChat()">Send ➤</button>
            </div>
          </div>
        </div>

        <div id="studyMode" style="display:none">
          <div class="tabs">
            <button class="tab active" onclick="switchTab('chat2', this)"><span>💬</span>Chat</button>
            <button class="tab" onclick="switchTab('flashcards', this)"><span>🃏</span>Flashcards</button>
            <button class="tab" onclick="switchTab('summarize', this)"><span>📝</span>Summarize</button>
            <button class="tab" onclick="switchTab('studyplan', this)"><span>📅</span>Study Plan</button>
          </div>

          <div id="chat2" class="section active">
            <div class="card">
              <div class="quick-prompts">
                <button class="quick-btn" onclick="quickPrompt2('Explain this topic in simple terms:')">📖 Explain topic</button>
                <button class="quick-btn" onclick="quickPrompt2('Give me practice questions on:')">📝 Practice questions</button>
                <button class="quick-btn" onclick="quickPrompt2('Summarize the key points of:')">🎯 Key points</button>
                <button class="quick-btn" onclick="quickPrompt2('What are common mistakes in:')">⚠️ Common mistakes</button>
              </div>
              <div class="chat-box" id="chatBox2"></div>
              <div class="chat-input">
                <input id="chatInput2" placeholder="Ask a study question…" onkeydown="if(event.key==='Enter') sendChat2()" />
                <button class="btn" onclick="sendChat2()">Send ➤</button>
              </div>
            </div>
          </div>

          <div id="flashcards" class="section">
            <div class="card" id="fcSetup">
              <div class="form-group">
                <label>Topic</label>
                <input id="fcTopic" placeholder="e.g. Photosynthesis, French Revolution, Calculus" />
              </div>
              <div class="range-row">
                <label>Number of cards</label>
                <input type="range" min="3" max="15" value="5" id="fcCount" oninput="document.getElementById('fcCountVal').textContent=this.value" />
                <span id="fcCountVal">5</span>
              </div>
              <button class="btn" id="fcBtn" onclick="generateCards()">Generate flashcards</button>
            </div>
            <div id="fcPlayer" style="display:none">
              <div class="card">
                <div class="progress-bar">
                  <span id="fcProgress">Card 1 of 5</span>
                  <span id="fcScore">✓ 0 · ↺ 0</span>
                </div>
                <div class="fc-card" onclick="flipCard()">
                  <div class="fc-label" id="fcLabel">Question</div>
                  <div class="fc-text" id="fcText"></div>
                  <div class="fc-hint" id="fcHint">tap to reveal answer</div>
                </div>
                <div class="fc-btns" id="fcBtns" style="display:none">
                  <button class="btn btn-outline" onclick="nextCard(false)">↺ Review again</button>
                  <button class="btn" onclick="nextCard(true)">✓ Got it</button>
                </div>
              </div>
            </div>
            <div id="fcDone" style="display:none">
              <div class="card done-card">
                <span class="emoji">🎉</span>
                <h2>Session complete!</h2>
                <p id="doneText"></p>
                <div class="done-btns">
                  <button class="btn btn-outline" onclick="restartCards()">Restart</button>
                  <button class="btn" onclick="newTopic()">New topic</button>
                </div>
              </div>
            </div>
          </div>

          <div id="summarize" class="section">
            <div class="card">
              <div class="form-group">
                <label>Paste your notes or text</label>
                <textarea id="notesInput" placeholder="Paste lecture notes, textbook content, or any study material here…"></textarea>
              </div>
              <button class="btn" id="sumBtn" onclick="summarizeNotes()">Summarize notes</button>
              <div id="summaryResult" style="display:none">
                <div class="result-label">Summary</div>
                <div class="result" id="summaryText"></div>
              </div>
            </div>
          </div>

          <div id="studyplan" class="section">
            <div class="card">
              <div class="form-group">
                <label>Subject</label>
                <input id="spSubject" placeholder="e.g. Organic Chemistry, Data Structures, Spanish" />
              </div>
              <div class="form-group">
                <label>Goal / Exam (optional)</label>
                <input id="spGoal" placeholder="e.g. JEE Mains, midterm exam, IELTS" />
              </div>
              <div class="range-row">
                <label>Days to study</label>
                <input type="range" min="3" max="30" value="7" id="spDays" oninput="document.getElementById('spDaysVal').textContent=this.value" />
                <span id="spDaysVal">7</span>
              </div>
              <button class="btn" id="planBtn" onclick="generatePlan()">Create study plan</button>
              <div id="planResult" style="display:none">
                <div class="result-label">Your Study Plan</div>
                <div class="result" id="planText"></div>
              </div>
            </div>
          </div>
        </div>

        <div class="footer">Made with ❤️ · AI Assistant</div>
      </div>
    </main>
  </div>

  <script>
    let sessions = JSON.parse(localStorage.getItem('chatSessions') || '[]');
    let activeId = localStorage.getItem('activeChatId') || null;

    function saveSessions() {
      localStorage.setItem('chatSessions', JSON.stringify(sessions));
      localStorage.setItem('activeChatId', activeId || '');
    }
    function getActive() { return sessions.find(s => s.id === activeId) || null; }

    function renderSidebar() {
      const list = document.getElementById('chatHistoryList');
      list.innerHTML = '';
      [...sessions].reverse().forEach(s => {
        const item = document.createElement('div');
        item.className = 'chat-history-item';
        if (s.id === activeId) item.style.cssText = 'background:var(--surface2); border-color:var(--accent);';
        const title = document.createElement('span');
        title.textContent = s.title;
        title.style.cssText = 'flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;';
        const del = document.createElement('button');
        del.textContent = '✕';
        del.style.cssText = 'background:transparent; border:none; color:var(--muted); cursor:pointer; font-size:12px; padding:0 4px; flex-shrink:0; transition:color 0.2s;';
        del.onmouseenter = () => del.style.color = '#f87171';
        del.onmouseleave = () => del.style.color = 'var(--muted)';
        del.onclick = (e) => { e.stopPropagation(); deleteSession(s.id); };
        item.appendChild(title);
        item.appendChild(del);
        item.onclick = () => loadSession(s.id);
        list.appendChild(item);
      });
    }

    function loadSession(id) {
      activeId = id; saveSessions(); renderSidebar();
      const session = getActive();
      const box = document.getElementById('chatBox');
      box.innerHTML = '';
      if (session) session.messages.forEach(m => renderMsg(m.content, m.role, 'chatBox'));
    }

    function deleteSession(id) {
      sessions = sessions.filter(s => s.id !== id);
      if (activeId === id) {
        activeId = sessions.length ? sessions[sessions.length - 1].id : null;
        document.getElementById('chatBox').innerHTML = '';
        if (activeId) loadSession(activeId);
      }
      saveSessions(); renderSidebar();
    }

    function createNewChat() {
      const id = 'chat_' + Date.now();
      sessions.push({ id, title: 'New Chat', messages: [] });
      activeId = id; saveSessions(); renderSidebar();
      document.getElementById('chatBox').innerHTML = '';
    }

    function pushMessage(role, content) {
      if (!activeId) createNewChat();
      const session = getActive();
      if (!session) return;
      session.messages.push({ role, content });
      if (role === 'user' && session.messages.filter(m => m.role === 'user').length === 1) {
        session.title = content.length > 35 ? content.slice(0, 35) + '…' : content;
      }
      saveSessions(); renderSidebar();
    }

    function toggleTheme() {
      const html = document.documentElement;
      const btn = document.getElementById("themeBtn");
      if (html.getAttribute("data-theme") === "dark") {
        html.setAttribute("data-theme", "light"); btn.textContent = "☀️ Light";
      } else {
        html.setAttribute("data-theme", "dark"); btn.textContent = "🌙 Dark";
      }
    }

    function switchMode(mode, el) {
      document.querySelectorAll(".mode-btn").forEach(b => b.classList.remove("active"));
      el.classList.add("active");
      document.getElementById("generalMode").style.display = mode === "general" ? "block" : "none";
      document.getElementById("studyMode").style.display = mode === "study" ? "block" : "none";
    }

    function switchTab(name, el) {
      document.querySelectorAll(".section").forEach(s => s.classList.remove("active"));
      document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
      document.getElementById(name).classList.add("active");
      el.classList.add("active");
    }

    async function post(url, data) {
      const res = await fetch(url, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(data) });
      return res.json();
    }

    function quickPrompt(text) { document.getElementById("chatInput").value = text + " "; document.getElementById("chatInput").focus(); }
    function quickPrompt2(text) { document.getElementById("chatInput2").value = text + " "; document.getElementById("chatInput2").focus(); }

    function renderMsg(text, role, boxId) {
      const box = document.getElementById(boxId);
      if (!box) return;
      const wrapper = document.createElement("div");
      wrapper.style.cssText = `display:flex; flex-direction:column; align-items:${role === "user" ? "flex-end" : "flex-start"}; gap:6px;`;
      const div = document.createElement("div");
      div.className = `msg ${role}`;
      div.textContent = text;
      wrapper.appendChild(div);
      if (role === "ai") {
        const copyBtn = document.createElement("button");
        copyBtn.textContent = "📋 Copy";
        copyBtn.style.cssText = `background:transparent; border:1px solid var(--border2); border-radius:8px; color:var(--muted); font-size:11px; padding:4px 12px; cursor:pointer; font-family:'Inter',sans-serif; font-weight:500; transition:all 0.2s;`;
        copyBtn.onmouseenter = () => { copyBtn.style.borderColor='var(--accent)'; copyBtn.style.color='var(--accent)'; };
        copyBtn.onmouseleave = () => { copyBtn.style.borderColor='var(--border2)'; copyBtn.style.color='var(--muted)'; };
        copyBtn.onclick = () => {
          navigator.clipboard.writeText(div.textContent);
          copyBtn.textContent = "✅ Copied!";
          setTimeout(() => copyBtn.textContent = "📋 Copy", 2000);
        };
        wrapper.appendChild(copyBtn);
      }
      box.appendChild(wrapper);
      box.scrollTop = box.scrollHeight;
      return div;
    }

    function addMsg(text, role, boxId) {
      const div = renderMsg(text, role, boxId);
      if (boxId === 'chatBox' && role !== 'thinking') pushMessage(role, text);
      return div;
    }

    async function sendChat() {
      const input = document.getElementById("chatInput");
      const q = input.value.trim();
      if (!q) return;
      addMsg(q, "user", "chatBox");
      input.value = "";
      const thinking = renderMsg("Thinking…", "thinking", "chatBox");
      const data = await post("/chat", { question: q });
      thinking.parentElement.remove();
      addMsg(data.answer, "ai", "chatBox");
    }

    async function sendChat2() {
      const input = document.getElementById("chatInput2");
      const q = input.value.trim();
      if (!q) return;
      renderMsg(q, "user", "chatBox2");
      input.value = "";
      const thinking = renderMsg("Thinking…", "thinking", "chatBox2");
      const data = await post("/chat", { question: q });
      thinking.parentElement.remove();
      renderMsg(data.answer, "ai", "chatBox2");
    }

    let cards = [], cardIndex = 0, flipped = false, score = { know: 0, review: 0 };

    async function generateCards() {
      const topic = document.getElementById("fcTopic").value.trim();
      const count = document.getElementById("fcCount").value;
      if (!topic) return;
      const btn = document.getElementById("fcBtn");
      btn.textContent = "Generating…"; btn.disabled = true;
      const data = await post("/flashcards", { topic, count: parseInt(count) });
      try {
        cards = JSON.parse(data.answer.replace(/```json|```/g, "").trim());
        cardIndex = 0; flipped = false; score = { know: 0, review: 0 };
        document.getElementById("fcSetup").style.display = "none";
        document.getElementById("fcPlayer").style.display = "block";
        showCard();
      } catch { alert("Error parsing flashcards. Try again."); }
      btn.textContent = "Generate flashcards"; btn.disabled = false;
    }

    function showCard() {
      document.getElementById("fcText").textContent = cards[cardIndex].q;
      document.getElementById("fcLabel").textContent = "Question";
      document.getElementById("fcHint").style.display = "block";
      document.getElementById("fcBtns").style.display = "none";
      document.getElementById("fcProgress").textContent = `Card ${cardIndex + 1} of ${cards.length}`;
      document.getElementById("fcScore").textContent = `✓ ${score.know} · ↺ ${score.review}`;
      flipped = false;
    }

    function flipCard() {
      if (flipped) return; flipped = true;
      document.getElementById("fcText").textContent = cards[cardIndex].a;
      document.getElementById("fcLabel").textContent = "Answer";
      document.getElementById("fcHint").style.display = "none";
      document.getElementById("fcBtns").style.display = "flex";
    }

    function nextCard(know) {
      score[know ? "know" : "review"]++;
      cardIndex++;
      if (cardIndex >= cards.length) {
        document.getElementById("fcPlayer").style.display = "none";
        document.getElementById("fcDone").style.display = "block";
        document.getElementById("doneText").textContent = `Knew: ${score.know} · Review: ${score.review} of ${cards.length} cards`;
      } else { showCard(); }
    }

    function restartCards() {
      cardIndex = 0; flipped = false; score = { know: 0, review: 0 };
      document.getElementById("fcDone").style.display = "none";
      document.getElementById("fcPlayer").style.display = "block";
      showCard();
    }

    function newTopic() {
      document.getElementById("fcDone").style.display = "none";
      document.getElementById("fcSetup").style.display = "block";
      document.getElementById("fcTopic").value = "";
    }

    async function summarizeNotes() {
      const notes = document.getElementById("notesInput").value.trim();
      if (!notes) return;
      const btn = document.getElementById("sumBtn");
      btn.textContent = "Summarizing…"; btn.disabled = true;
      const data = await post("/summarize", { notes });
      document.getElementById("summaryText").textContent = data.answer;
      document.getElementById("summaryResult").style.display = "block";
      btn.textContent = "Summarize notes"; btn.disabled = false;
    }

    async function generatePlan() {
      const subject = document.getElementById("spSubject").value.trim();
      const goal = document.getElementById("spGoal").value.trim();
      const days = document.getElementById("spDays").value;
      if (!subject) return;
      const btn = document.getElementById("planBtn");
      btn.textContent = "Building plan…"; btn.disabled = true;
      const data = await post("/studyplan", { subject, goal, days: parseInt(days) });
      document.getElementById("planText").textContent = data.answer;
      document.getElementById("planResult").style.display = "block";
      btn.textContent = "Create study plan"; btn.disabled = false;
    }

    async function clearHistory() {
      await post("/clear", {});
      sessions = []; activeId = null;
      saveSessions(); renderSidebar();
      document.getElementById("chatBox").innerHTML = "";
      document.getElementById("chatBox2").innerHTML = "";
    }

    document.addEventListener('DOMContentLoaded', () => {
      renderSidebar();
      if (activeId && getActive()) loadSession(activeId);
    });
  </script>
</body>
</html>
